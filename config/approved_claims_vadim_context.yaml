    claim_text: Led a six-person team.
    note: Approval is limited to a six-person team and does not authorize any broader management-scope claim.
    approval_match_patterns:
      - '\b(?:team of 6|six-person team)\b'
    confidence: high
    requires_user_approval: false

  - claim_id: employment_history
    approval_status: APPROVED_FROM_USER_CONTEXT
    source: user_authorized_evidence_2026-06-20
    claim_text: Marketing Automation & Data Manager at Teladoc Health from October 2015 through June 2019, approximately 3 years 8 months; Senior Specialist, Digital Data & Analytics at Ryan from July 2019 through February 2020, approximately 8 months.
    note: Only the two listed employers, titles, date ranges, and approximate durations are approved. No other prior employment details or full-career tenure are authorized by this import.
    approval_match_patterns:
      - '\bTeladoc Health\b'
      - '\bRyan\b'
    confidence: high
    requires_user_approval: false

