  - claim_id: years_of_experience
    approval_status: APPROVED_FROM_RESUME
    source: Vadim-Koenen-Resume-June-2026.pdf
    claim_text: 14 years building revenue systems and B2B marketing operations; 10+ years of date-backed experience across marketing automation, revenue systems, MarTech operations, digital analytics, lifecycle architecture, CRM sync, ABM, and GTM systems.
    note: The resume and live website both state 14 years. Date-backed roles run from Teladoc Health in October 2015 through KRS in the present. This does not authorize 15+ years or tenure in unrelated functions such as product leadership, paid-media leadership, sales leadership, customer success, or executive-assistant work.
