      - '\b(?:[1-9]|1[0-4])\+?\s+years?\b.{0,180}\b(?:marketing automation|Marketo|campaign operations|marketing operations|MarTech|lifecycle|CRM sync|CRM integration|revenue systems?|marketing systems?|GTM systems?|business systems|enterprise applications|digital data|digital analytics|analytics|GA4|Google Analytics|tag management|campaign analytics|data quality|ABM|attribution|identity resolution)\b'
      - '\b(?:marketing automation|Marketo|campaign operations|marketing operations|MarTech|lifecycle|CRM sync|CRM integration|revenue systems?|marketing systems?|GTM systems?|business systems|enterprise applications|digital data|digital analytics|analytics|GA4|Google Analytics|tag management|campaign analytics|data quality|ABM|attribution|identity resolution)\b.{0,180}\b(?:[1-9]|1[0-4])\+?\s+years?\b'
    confidence: high
    requires_user_approval: false

