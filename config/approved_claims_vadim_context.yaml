approvals:
  - claim_id: years_of_experience
    approval_status: APPROVED_FROM_USER_CONTEXT
    source: user_provided_resume_context_2026-06-20
    claim_text: 4+ years of date-backed experience across marketing automation, digital data, analytics, and revenue/marketing systems roles; including 3+ years as Marketing Automation & Data Manager at Teladoc Health.
    note: Date-backed scope is limited to Teladoc Health from October 2015 through June 2019 and Ryan from July 2019 through February 2020, approximately 4 years 4 months combined. This does not authorize 10+ years, 15+ years, full-career tenure, KRS tenure, executive tenure, or unrelated functional tenure.
    approval_match_patterns:
      - '\b[1-4]\+?\s+years?\b.{0,160}\b(?:marketing automation|Marketo|campaign operations|lifecycle workflows?|(?:Salesforce|SFDC).{0,40}(?:CRM|integration|sync)|(?:CRM|integration|sync).{0,40}(?:Salesforce|SFDC)|data hygiene|campaign QA|revenue systems?|marketing systems?)\b'
      - '\b(?:marketing automation|Marketo|campaign operations|lifecycle workflows?|(?:Salesforce|SFDC).{0,40}(?:CRM|integration|sync)|(?:CRM|integration|sync).{0,40}(?:Salesforce|SFDC)|data hygiene|campaign QA|revenue systems?|marketing systems?)\b.{0,160}\b[1-4]\+?\s+years?\b'
      - '\b[1-4]\+?\s+years?\b.{0,160}\b(?:digital data|analytics|GA4|Google Analytics 4|tag management|campaign analytics|data quality)\b'
      - '\b(?:digital data|analytics|GA4|Google Analytics 4|tag management|campaign analytics|data quality)\b.{0,160}\b[1-4]\+?\s+years?\b'
    confidence: high
    requires_user_approval: false

  - claim_id: quantified_achievements
    approval_status: APPROVED_FROM_USER_CONTEXT
    source: user_authorized_evidence_2026-06-20
    claim_text: Reduced campaign time-to-market by 35%; activated $51M in pipeline; and traced $3.4M in closed-won revenue.
    note: Only these three exact metrics are approved. No other revenue, pipeline, growth, conversion, or cost metric is authorized.
    approval_match_patterns:
      - '35%'
      - '\$51M\b'
      - '\$3\.4M\b'
    confidence: high
    requires_user_approval: false

  - claim_id: leadership_team_size
    approval_status: APPROVED_FROM_USER_CONTEXT
