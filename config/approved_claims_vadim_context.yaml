      - '\b(?:expert|expertise|proficient|proficiency|certified)\s+(?:in|with)?\s*.{0,80}\btag management\b'
      - '\b(?:expert|expertise|proficient|proficiency|certified)\s+(?:in|with)?\s*.{0,80}\bPython\b'
      - '\b(?:expert|expertise|proficient|proficiency|certified)\s+(?:in|with)?\s*.{0,80}\bOpenAI API\b'
      - '\b(?:expert|expertise|proficient|proficiency|certified)\s+(?:in|with)?\s*.{0,80}\bClaude API\b'
      - '\b(?:expert|expertise|proficient|proficiency|certified)\s+(?:in|with)?\s*.{0,80}\bCRM integration\b'
      - '\b(?:expert|expertise|proficient|proficiency|certified)\s+(?:in|with)?\s*.{0,80}\bABM\b'
