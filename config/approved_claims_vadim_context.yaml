    note: Approval is limited to the named tools and capabilities in claim_text and does not imply unlisted certifications, employers, or quantified outcomes.
    approval_match_patterns:
      - '\b(?:expert|expertise|proficient|proficiency|certified)\s+(?:in|with)?\s*.{0,80}\bMarketo\b'
      - '\b(?:expert|expertise|proficient|proficiency|certified)\s+(?:in|with)?\s*.{0,80}\b(?:Salesforce|SFDC)\b'
      - '\b(?:expert|expertise|proficient|proficiency|certified)\s+(?:in|with)?\s*.{0,80}\bHubSpot\b'
