    approval_status: APPROVED_FROM_RESUME
    source: Vadim-Koenen-Resume-June-2026.pdf
    claim_text: Drove $51M in pipeline opportunities and $3.4M in closed-won revenue through intent data and identity-resolution models; reduced campaign time-to-market by 35%; deployed 25+ named-account microsites; audited four global Marketo instances; and maintained or audited 250+ step HubSpot workflows.
    note: Approval is limited to the exact metrics listed in the resume and corroborated on the live website where applicable.
    approval_match_patterns:
      - '35%'
      - '\$51M\b'
      - '\$3\.4M\b'
      - '\b25\+\b.{0,60}\bmicrosites?\b'
      - '\bfour\b.{0,60}\bMarketo instances?\b'
      - '\b250\+\b.{0,60}\bHubSpot workflows?\b'
    confidence: high
    requires_user_approval: false

