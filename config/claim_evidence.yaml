  approval_status: APPROVED_FROM_RESUME
  evidence_source: Vadim-Koenen-Resume-June-2026.pdf
  evidence_detail: Approval is limited to the exact metrics listed in the resume and
    corroborated on the live website where applicable.
  allowed_contexts:
