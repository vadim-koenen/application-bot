- claim_id: years_of_experience
  claim_text: 14 years building revenue systems and B2B marketing operations; 10+
    years of date-backed experience across marketing automation, revenue systems,
    MarTech operations, digital analytics, lifecycle architecture, CRM sync, ABM,
    and GTM systems.
  category: tenure
  approval_status: APPROVED_FROM_RESUME
  evidence_source: Vadim-Koenen-Resume-June-2026.pdf
  evidence_detail: The resume and live website both state 14 years. Date-backed roles
    run from Teladoc Health in October 2015 through KRS in the present. This does
    not authorize 15+ years or tenure in unrelated functions such as product leadership,
    paid-media leadership, sales leadership, customer success, or executive-assistant
    work.
  allowed_contexts:
  - application_answer
  - approval_pack
  - claim_gap
  - packet_text
  prohibited_contexts: []
  confidence: high
  requires_user_approval: false
  last_verified_at: '2026-06-21'
  safe_rewrite: Relevant approved positioning aligns with the role; exact tenure must
    be confirmed separately.
  risk_level: high
  approval_match_patterns:
  - \b(?:[1-9]|1[0-4])\+?\s+years?\b.{0,180}\b(?:marketing automation|Marketo|campaign
    operations|marketing operations|MarTech|lifecycle|CRM sync|CRM integration|revenue
    systems?|marketing systems?|GTM systems?|business systems|enterprise applications|digital
    data|digital analytics|analytics|GA4|Google Analytics|tag management|campaign
    analytics|data quality|ABM|attribution|identity resolution)\b
  - \b(?:marketing automation|Marketo|campaign operations|marketing operations|MarTech|lifecycle|CRM
    sync|CRM integration|revenue systems?|marketing systems?|GTM systems?|business
    systems|enterprise applications|digital data|digital analytics|analytics|GA4|Google
    Analytics|tag management|campaign analytics|data quality|ABM|attribution|identity
    resolution)\b.{0,180}\b(?:[1-9]|1[0-4])\+?\s+years?\b
