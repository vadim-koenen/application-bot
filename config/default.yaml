target_titles:
  - director
  - senior director
  - sr director
  - vice president
  - vp
  - head of
  - executive

reject_titles:
  - coordinator
  - specialist
  - associate
  - manager

# A "Manager"/"Lead" title is in-lane when paired with a systems/ops function
# Vadim owns. These roles score below Director but above the reject floor.
systems_lane_titles:
  - manager
  - lead
systems_lane_functions:
  - systems
  - operations
  - revops
  - revenue operations
  - marketing operations
  - marketing technology
  - martech
  - gtm systems
  - marketing data
systems_lane_points: 12

target_keywords:
  - growth marketing
  - demand generation
  - revenue systems
  - revenue operations
  - revops
  - gtm systems
  - go-to-market
  - gtm strategy
  - marketing operations
  - marketing technology
  - martech
  - marketing systems
  - lifecycle marketing
  - lifecycle operations
  - marketing automation
  - abm
  - ai transformation

reject_keywords:
  - account executive
  - sales representative
  - cold calling
  - product marketing
  - paid media
  - performance marketing
  - media buying
  - brand marketing
  - field marketing

off_lane_titles:
  - director, product
  - director of product
  - head of product
  - product marketing
  - customer success
  - technical program management
  - performance marketing
  - paid media
  - brand marketing
  - field marketing
  - consumer growth
  # Off-lane functions that slip through on a Director/Head title.
  - engineer
  - design
  - finance
  - accounting
  - controller
  - legal
  - counsel
  - attorney
  - litigation
  - recruiter
  - talent acquisition
  - people operations
  - human resources
  - account management
  - account executive
  - solutions architect
  - executive assistant
  - administrative assistant
  - business partner
  - chief of staff

role_mismatch_penalty: -30

years_requirement_scoring:
  approved_years: 14
  moderate_threshold: 15
  moderate_penalty: -6
  high_threshold: 18
  high_penalty: -15

packet_soft_requirement_claims:
  - years_of_experience

# Discovery freshness window (hours) for the New tab + default scans.
discovery_window_hours: 72
# Hard location gate: a role must be remote OR in the DFW metroplex.
require_remote_or_dfw: true
location_preferences:
  remote_us:
    - remote
    - united states
    - us remote
    - remote - us
  dfw:
    - dallas
    - plano
    - dfw
    - fort worth
    - metroplex
    - irving
    - frisco
    - mckinney
    - arlington
    - richardson
    - garland
    - denton
    - carrollton
    - lewisville
    - allen
    - grand prairie
    - addison
    - euless
    - grapevine
    - southlake
    - flower mound
    - the colony
    # DFW metroplex counties (Adzuna lists "City, County").
    - tarrant
    - collin
    - rockwall
    - kaufman

salary_minimums:
  default: 140000
  director: 150000
  senior_director: 175000
  vp: 200000

source_policy:
  greenhouse: AUTO_PACKET_ONLY
  lever: AUTO_PACKET_ONLY
  ashby: AUTO_PACKET_ONLY
  linkedin_review_queue: REVIEW_REQUIRED
  indeed_connector: BLOCKED
  zip_connector: BLOCKED

dry_run: true
live_apply_enabled: false
live_email_send_enabled: false
email_send_approval_phrase: ""
database_path: data/application_bot.sqlite
export_path: exports
live_company_registry: config/live_company_registry.yaml
resume_claim_inventory: config/resume_claim_inventory.yaml
resume_master: data/private/resume_master.yaml
claim_evidence: config/claim_evidence.yaml
application_answer_bank: config/application_answer_bank.yaml
pipeline_limit: 25

packet_thresholds:
  ready_min_score: 65
  review_min_score: 45
  strong_function_points: 10

scheduler:
  enabled: false
  cadence: daily
  time: "08:00"
  timezone: America/Chicago
