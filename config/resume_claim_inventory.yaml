approved_metrics: []

prohibited_or_unverified_claims:
  - id: years_of_experience
    description: Any exact years-of-experience statement requires user approval.
    patterns:
      - "\\b\\d{1,2}\\+?\\s+years?\\b"
  - id: degrees
    description: Degrees and fields of study are not verified.
    patterns:
      - "\\b(bachelor|bachelor's|master|master's|mba|phd|degree)\\b"
  - id: certifications
    description: Certifications are not verified.
    patterns:
      - "\\b(certified|certification|certificate)\\b"
  - id: employment_history
    description: Prior employers, titles, and employment dates are not verified.
    patterns:
      - "\\bprevious employer\\b"
  - id: quantified_achievements
    description: Revenue, pipeline, growth, conversion, or cost metrics require approval.
    patterns:
      - "\\b(increased|grew|generated|delivered|reduced|improved)\\b.{0,40}\\b\\d+(?:\\.\\d+)?%?\\b"
  - id: leadership_team_size
    description: Exact team size requires user evidence.
    patterns:
      - "\\b(team of|managed|led)\\s+\\d+\\b"
  - id: budget_ownership
    description: Exact budget ownership requires user evidence.
    patterns:
      - "\\$\\s?\\d+(?:\\.\\d+)?\\s?(?:m|mm|million|k|thousand)?\\s+(?:budget|spend)"
  - id: work_authorization
    description: Work authorization and sponsorship answers require user confirmation.
    patterns:
      - "\\b(work authorization|authorized to work|visa|sponsorship)\\b"
  - id: compensation_history
    description: Compensation history and expectations require user confirmation.
    patterns:
      - "\\b(compensation history|salary history|current compensation)\\b"
  - id: named_tool_proficiency
    description: Proficiency in a named vendor platform requires user approval.
    patterns:
      - "\\b(expert|expertise|proficient|certified)\\s+(in|with)\\b"

claims_requiring_user_approval_before_use:
  - Exact years of experience
  - Degrees, certifications, and formal credentials
  - Prior employers, job titles, and employment dates
  - Quantified revenue, pipeline, growth, conversion, or cost achievements
  - Named-platform proficiency or certification
  - Work authorization, sponsorship, compensation, and legal attestations

claim_substitution_rules:
  - when: A posting requests an unverified achievement or metric.
    use: State the approved positioning theme and add a claim_gap for user review.
  - when: A posting requests exact tenure, degree, certification, or named-tool proficiency.
    use: Do not answer affirmatively; add the corresponding claim_gap.
  - when: A posting uses an unapproved keyword.
    use: Do not mirror it as candidate experience; retain it only in the raw job excerpt.
